server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Needed for large JSON snapshot files (workovers.json is ~26 MB)
    # Gzip reduces wire size to ~3-4 MB.
    gzip on;
    gzip_types application/javascript application/json text/css text/plain image/svg+xml;
    gzip_min_length 1024;
    gzip_vary on;

    # API calls are proxied by Caddy — this block is a safety net so the
    # container still works if accessed directly without Caddy.
    location /api/ {
        proxy_pass http://api:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 60s;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}

services:
  db:
    image: postgres:16-alpine
    container_name: well-startup-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-wells}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-wells}
      POSTGRES_DB: ${POSTGRES_DB:-wells}
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-wells}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks: [internal]

  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: well-startup-api
    environment:
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-wells}:${POSTGRES_PASSWORD:-wells}@db:5432/${POSTGRES_DB:-wells}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    networks: [internal]

  web:
    build: ./frontend
    container_name: well-startup-web
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.well-web.rule=Host(`wellstat.tech`) || Host(`www.wellstat.tech`)"
      - "traefik.http.routers.well-web.entrypoints=websecure"
      - "traefik.http.routers.well-web.tls=true"
      - "traefik.http.routers.well-web.tls.certresolver=letsencrypt"
      - "traefik.http.services.well-web.loadbalancer.server.port=80"
    depends_on:
      - api
    restart: unless-stopped
    networks: [internal]

volumes:
  pgdata:

networks:
  internal:
    driver: bridge
